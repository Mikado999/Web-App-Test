<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mobile PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: sans-serif;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .icon-preview {
            width: 100px;
            height: 100px;
            background: #333;
            border-radius: 20%;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            background: #00d1b2;
            color: black;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="icon-preview">
        <img src="pwa.png" alt="App Icon" style="width:100%; border-radius:20%;">
    </div>
    
    <h1>PWA Project</h1>
    <p>Install this via Chrome menu!</p>
    <button onclick="alert('Hello from your app!')">Test App</button>

    <script>
        // Register the background worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
